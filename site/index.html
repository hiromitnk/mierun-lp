<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>mierun — 板金加工業のためのAI外観検査</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css">
<style>
  /* ============================================
     body : 明るめのヘアライン仕上げ金属テクスチャ
     板金屋さんが見て「うちの世界だ」となるよう、
     SVG で水平方向のブラッシュ繊維 + 天井反射グラデを合成。
     ============================================ */
  body {
    margin: 0;
    min-height: 100vh;
    background-color: #c9ccd1;
    background-image:
      /* 1) ヘアライン繊維 (水平方向に強く引き伸ばした turbulence) */
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='1600' height='400'><filter id='b'><feTurbulence type='fractalNoise' baseFrequency='0.9 0.012' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 0.55  0 0 0 0 0.57  0 0 0 0 0.6  0 0 0 0.55 0'/></filter><rect width='100%25' height='100%25' filter='url(%23b)'/></svg>"),
      /* 2) 細かい粒状ノイズ (ザラつきで'刷り'感) */
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.6' numOctaves='2' seed='9'/><feColorMatrix values='0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 0.18 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"),
      /* 3) 天井光〜陰のごく緩い縦グラデ (金属のハイライト感) */
      linear-gradient(180deg, #e5e8ec 0%, #ccd0d6 38%, #b5b9c0 62%, #cfd2d8 100%);
    background-size: 1600px 400px, 240px 240px, 100% 100%;
    background-repeat: repeat, repeat, no-repeat;
    background-attachment: fixed, fixed, fixed;
  }

  /* 紙(lp-frame)が金属の上に乗っているような立体感 */
  .lp-frame {
    width: 90vw;
    max-width: 1400px;
    margin: 40px auto;
    background: #fcfcfc;
    border-radius: 4px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.6) inset,        /* 上端のハイライト */
      0 24px 56px -16px rgba(20, 30, 50, 0.35),    /* 主シャドウ */
      0 48px 120px -40px rgba(20, 30, 50, 0.45),   /* 拡散シャドウ */
      0 0 0 1px rgba(20, 30, 50, 0.08);            /* 微細な縁 */
    /* 万一の横はみ出しを防ぐ(sticky ヘッダーは body スクロール基準なので効く) */
    overflow-x: hidden;
  }
  /* 日本語の長い文字列でも必ず折り返す */
  .mierun p, .mierun h1, .mierun h2, .mierun h3, .mierun li, .mierun span {
    overflow-wrap: anywhere;
  }
  .lp-frame > div { width: 100% !important; }
  .lp-frame .mierun { width: 100% !important; max-width: 100% !important; }

  /* ============================================
     ヘッダー: 全画面幅で sticky 固定
     - PC: ロゴ + ナビ4項目 + CTA
     - SP (≤767px): ロゴ + CTA のみ
     ============================================ */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 56px;
    background: rgba(252, 252, 252, 0.9);
    backdrop-filter: saturate(1.4) blur(10px);
    -webkit-backdrop-filter: saturate(1.4) blur(10px);
    border-bottom: 1px solid #e8e8e8;
  }
  .site-header--dark {
    background: rgba(14, 10, 46, 0.7);
    border-bottom-color: rgba(255, 255, 255, 0.1);
  }
  .site-header__logo { display: inline-flex; align-items: center; }
  .site-header__nav {
    display: flex;
    gap: 28px;
    align-items: center;
  }
  .site-header__link {
    font-size: 15px;
    font-weight: 600;
    color: #0E0A2E;
    text-decoration: none;
    opacity: 0.85;
    transition: opacity 0.15s;
  }
  .site-header__link:hover { opacity: 1; }
  .site-header--dark .site-header__link { color: #FFF3D6; }
  .site-header__cta {
    padding: 10px 20px !important;
    font-size: 15px !important;
    text-decoration: none;
  }

  /* タブレット寄り: ナビリンクの間隔を詰める */
  @media (max-width: 1024px) {
    .site-header { padding: 14px 32px; }
    .site-header__nav { gap: 20px; }
    .site-header__link { font-size: 14px; }
  }

  /* ============================================
     フッター
     ============================================ */
  .site-footer {
    background: var(--c-footer-bg, #0E0A2E);
    color: #ffffff;
    padding: 60px 56px 28px;
  }
  .site-footer__top {
    display: flex;
    justify-content: space-between;
    gap: 40px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .site-footer__brand { max-width: 280px; }
  .site-footer__tagline {
    margin-top: 16px;
    font-size: 16px;
    opacity: 0.7;
    line-height: 1.7;
  }
  .site-footer__cols {
    display: flex;
    gap: 60px;
    flex-wrap: wrap;
  }
  .site-footer__col-title {
    font-size: 16px;
    font-weight: 700;
    opacity: 0.5;
    margin-bottom: 14px;
  }
  .site-footer__link {
    display: block;
    font-size: 16px;
    margin-bottom: 10px;
    opacity: 0.85;
    color: inherit;
    text-decoration: none;
    transition: opacity 0.15s, color 0.15s;
  }
  .site-footer__bottom {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.12);
    display: flex;
    justify-content: space-between;
    font-size: 16px;
    opacity: 0.5;
    gap: 16px;
    flex-wrap: wrap;
  }
  @media (max-width: 1024px) {
    .site-footer { padding: 48px 32px 24px; }
    .site-footer__cols { gap: 40px; }
  }
  @media (max-width: 767px) {
    .site-footer {
      padding: 40px 20px 24px;
    }
    /* トップ (brand + cols) 全体を縦積み中央 */
    .site-footer__top {
      flex-direction: column;
      gap: 32px;
      align-items: center;
      text-align: center;
    }
    .site-footer__brand {
      max-width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    /* カラム: 2列grid、3個目は全幅で中央に */
    .site-footer__cols {
      display: grid !important;
      grid-template-columns: 1fr 1fr;
      gap: 28px 20px;
      width: 100%;
    }
    .site-footer__col {
      flex: none;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .site-footer__col:nth-child(3) {
      grid-column: 1 / -1;   /* 3個目 (Company) を2列またぐ */
    }
    .site-footer__col-title { font-size: 14px; margin-bottom: 10px; }
    .site-footer__link { font-size: 15px; margin-bottom: 8px; text-align: center; }
    /* コピーライト部分も中央寄せ */
    .site-footer__bottom {
      margin-top: 32px;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
      align-items: center;
      text-align: center;
      justify-content: center;
    }
  }

  /* スマホ: ナビリンクを隠してロゴ+CTAだけ */
  @media (max-width: 767px) {
    .site-header {
      padding: 12px 16px;
    }
    .site-header__link { display: none; }
    .site-header__nav { gap: 0; }
    .site-header__cta {
      padding: 9px 14px !important;
      font-size: 13px !important;
    }
  }

  @media (max-width: 880px) {
    .lp-frame { margin: 16px auto; border-radius: 2px; }
  }

  /* ============================================
     モバイル最適化 (幅767px以下)
     React インラインstyle で組まれたグリッド・padding・フォントを一括で調整
     ============================================ */
  @media (max-width: 767px) {
    /* SPでは金属背景をやめて白ベタに (lp-frame が全幅化するので土台が見える必要なし) */
    body {
      background-color: #fcfcfc !important;
      background-image: none !important;
    }
    /* lp-frame の白フレームを完全に剥がして全幅化 */
    .lp-frame {
      width: 100% !important;
      max-width: 100% !important;
      margin: 0 !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      background: #fcfcfc !important;
    }
    /* mierun 内のセクション余白を圧縮 */
    .mierun > section,
    .mierun > div > section,
    .lp-frame .mierun {
      padding-left: 16px !important;
      padding-right: 16px !important;
    }
    /* セクション自体の上下余白も少し詰める */
    .mierun section[style*="padding"] {
      padding-top: 40px !important;
      padding-bottom: 48px !important;
    }
    /* あらゆる grid を単列化 (2列以上を1列に) */
    .mierun [style*="grid-template-columns"],
    .mierun [style*="gridTemplateColumns"] {
      grid-template-columns: 1fr !important;
      gap: 16px !important;
    }
    /* Flow の3列 stats や FeatureCard 内の "num_stats" 系はキープしたい
       → data属性か class で個別除外できるが、まずは全単列で。あとで例外調整可 */

    /* ヒーロー h1 のフォントサイズを縮小 */
    .mierun h1 {
      font-size: 34px !important;
      line-height: 1.28 !important;
    }
    .mierun h2 {
      font-size: 26px !important;
      line-height: 1.4 !important;
    }
    .mierun h3 {
      font-size: 20px !important;
    }
    /* 長い英文 eyebrow は letter-spacing を詰める */
    .mierun .eyebrow, .mierun .en {
      letter-spacing: 0.08em !important;
    }

    /* Hero C のリード文が大きすぎる */
    .mierun p[style*="font-size: 22"],
    .mierun p[style*="fontSize: 22"] {
      font-size: 16px !important;
      line-height: 1.75 !important;
    }

    /* Before/After の中央COMPARE矢印を横向き→下向きに (SVG のみ回転) */
    .mierun .compare-badge__arrow {
      transform: rotate(90deg);
    }

    /* Enclosure の drawing box (400x440 固定) をカード幅に合わせる */
    .mierun [style*="minHeight: 460"] {
      min-height: 380px !important;
      padding: 24px 12px 40px !important;
    }
    /* Enclosure の描画エリアラッパー (width固定 400) */
    .mierun [style*="max-width: 400"] {
      max-width: 100% !important;
      height: 340px !important;
    }

    /* 各種カード内 padding も少し詰める */
    .mierun [style*="padding: 28px 32px"],
    .mierun [style*="padding: 28px 28px"],
    .mierun [style*="padding: 32px"] {
      padding: 20px !important;
    }

    /* SectionHead の sub テキスト max-width 制限を外す */
    .mierun p[style*="max-width: 880"],
    .mierun p[style*="maxWidth: 880"],
    .mierun p[style*="max-width: 720"],
    .mierun p[style*="maxWidth: 720"] {
      max-width: 100% !important;
      font-size: 16px !important;
    }

    /* Feature/Flow などのSVGイラストは幅を抑える */
    .mierun svg[width][height] {
      max-width: 100%;
    }

    /* EventBanner の日付など、大きい表示を少し縮小 */
    .mierun [style*="font-size: 60"],
    .mierun [style*="fontSize: 60"],
    .mierun [style*="font-size: 72"],
    .mierun [style*="fontSize: 72"],
    .mierun [style*="font-size: 88"],
    .mierun [style*="fontSize: 88"] {
      font-size: 40px !important;
    }
    .mierun [style*="font-size: 48"],
    .mierun [style*="fontSize: 48"],
    .mierun [style*="font-size: 40"],
    .mierun [style*="fontSize: 40"] {
      font-size: 30px !important;
    }
    .mierun [style*="font-size: 36"],
    .mierun [style*="fontSize: 36"] {
      font-size: 24px !important;
    }
    .mierun [style*="font-size: 28"],
    .mierun [style*="fontSize: 28"] {
      font-size: 20px !important;
    }

    /* ============================================
       ▼ ヒロミ指示分の SP 個別調整 (2026-07 追記)
       ============================================ */

    /* ① 全幅化: .lp-frame の白フレーム/角丸/シャドウ/余白を全部消す
       金属背景が見えなくなってもOK、スマホは端まで使う */
    .lp-frame {
      width: 100% !important;
      max-width: 100% !important;
      margin: 0 !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    body {
      /* SPでは重い金属テクスチャは描画コスト無駄なので普通の白背景に */
      background: #fcfcfc !important;
    }

    /* ② HeroC の Before/After は SP でも横並びを維持
       (汎用ルールで 1fr にされるのを打ち消し) */
    .mierun .hero-c-title + p + div[style*="grid-template-columns"] {
      grid-template-columns: 1fr auto 1fr !important;
      gap: 8px !important;
    }
    /* Before/After のカード内 padding も詰める */
    .mierun .hero-c-title + p + div[style*="grid-template-columns"] > div {
      min-width: 0;
    }
    .mierun .hero-c-title + p + div[style*="grid-template-columns"] .en {
      font-size: 10px !important;
      letter-spacing: 0.08em !important;
    }
    /* 中央のCOMPARE丸ボタンを小さく + 矢印は横向きのまま(単列化しないので) */
    .mierun .compare-badge__circle {
      width: 40px !important;
      height: 40px !important;
    }
    .mierun .compare-badge__circle svg {
      width: 18px;
      height: 18px;
    }
    /* SP でも横並びなので矢印は右向きに戻す (汎用ルールで下向き回転していたのを解除) */
    .mierun .compare-badge__arrow {
      transform: none !important;
    }
    /* Before/After カード内 padding を詰めてはみ出し防止 */
    .mierun .hero-c-title + p + div[style*="grid-template-columns"] > div > div[style*="border-radius"] {
      padding: 6px !important;
    }

    /* ③ Problems CTA バー (「1つでも当てはまるなら」) を縦積みに
       ※ 属性セレクタは React のstyle正規化で当たらないので専用クラスで指定 */
    .mierun .problems-cta-bar {
      flex-direction: column !important;
      align-items: stretch !important;
      gap: 18px !important;
      text-align: center;
      padding: 24px 20px !important;
    }
    .mierun .problems-cta-bar > div {
      text-align: center;
    }
    .mierun .problems-cta-bar .btn-primary {
      width: 100%;
      justify-content: center;
    }

    /* ④ Enclosure 標準サイズのカード: デモバッジをタグバーの下(=筐体の上)へ移動
       タグバー全体を縦積みにしてバッジを別行に */
    .mierun [style*="border-bottom: 1px dashed"][style*="justify-content: space-between"] {
      flex-direction: column !important;
      align-items: flex-start !important;
      gap: 10px !important;
    }

    /* ⑤ FlowB の縦タイムライン: 左の縦棒を消す + カード内 grid を単列化
       (grid: '80px 1fr 360px' → 単列)
       汎用 grid ルールで既に単列化されるが、gap調整のみ */
    /* 縦棒 (position: absolute; left: 40; width: 2) を消す */
    .mierun [style*="position: absolute"][style*="left: 40"][style*="width: 2"] {
      display: none !important;
    }
    /* 各ステップの丸番号(80px)を左寄せに */
    .mierun [style*="grid-template-columns: 80px 1fr 360px"] > div[style*="width: 80px"],
    .mierun [style*="gridTemplateColumns: 80px 1fr 360px"] > div[style*="width: 80px"] {
      margin: 0;
    }

    /* ⑥ お問い合わせフォームは既に汎用 grid ルールで 1fr になっているはず。
       CtaB のカード padding をさらに詰める */
    .mierun [style*="padding: 56px 64px"] {
      padding: 28px 20px !important;
    }
    .mierun [style*="border-radius: 28"] {
      border-radius: 16px !important;
    }
    /* お問い合わせフォームの内側カード余白 */
    .mierun [style*="background: #f0f0f0"][style*="border-radius: 20"][style*="padding: 32"] {
      padding: 20px !important;
    }

    /* ⑦ フッター全幅化 + 白フチ撤廃
       .lp-frame > div.mierun (SiteFooter を包む親) にも padding:16px が
       汎用ルール ".lp-frame .mierun" で当たってしまっているので、
       フッター側だけ padding をゼロにして幅いっぱいに広げる */
    .lp-frame > div.mierun {
      padding-left: 0 !important;
      padding-right: 0 !important;
    }
    .site-footer {
      padding-left: 20px !important;
      padding-right: 20px !important;
      margin-left: 0 !important;
      margin-right: 0 !important;
      width: 100% !important;
      box-sizing: border-box;
    }

    /* ⑩ Benefits の BEFORE/AFTER 対比表を SP でも横並び (1fr 24px 1fr) を維持
       — 単列化されると対比の意味が消えるため */
    .mierun [style*="grid-template-columns: 1fr 80px 1fr"],
    .mierun [style*="gridTemplateColumns: 1fr 80px 1fr"] {
      grid-template-columns: 1fr 24px 1fr !important;
      gap: 8px !important;
      padding: 14px 12px !important;
    }
    /* BEFORE/AFTER 表内テキストを SP で読めるサイズに */
    .mierun [style*="grid-template-columns: 1fr 80px 1fr"] > div,
    .mierun [style*="gridTemplateColumns: 1fr 80px 1fr"] > div {
      font-size: 14px !important;
      line-height: 1.5 !important;
    }
    /* BEFORE/AFTER の見出し行 (「属人化した検査」等) は少しだけ大きく */
    .mierun [style*="grid-template-columns: 1fr 80px 1fr"] > div > div[style*="font-size: 22"],
    .mierun [style*="gridTemplateColumns: 1fr 80px 1fr"] > div > div[style*="fontSize: 22"] {
      font-size: 15px !important;
    }
    /* ✓バッジを小さく */
    .mierun [style*="grid-template-columns: 1fr 80px 1fr"] span[style*="width: 36px"],
    .mierun [style*="gridTemplateColumns: 1fr 80px 1fr"] span[style*="width: 36px"] {
      width: 24px !important;
      height: 24px !important;
      font-size: 13px !important;
    }
    /* 矢印列 → の文字も小さめ */
    .mierun [style*="grid-template-columns: 1fr 80px 1fr"] > div[style*="text-align: center"][style*="font-size: 22"] {
      font-size: 14px !important;
    }

    /* ⑧ ヘッダーも全幅なので padding だけキープ (既に 12/16px なのでOK) */

    /* ⑨ EventBanner (オレンジ告知) の左右余白も画面いっぱいまで */
    .mierun [style*="background: #FE5E32"][style*="border-radius"] {
      border-radius: 12px !important;
    }

    /* ⑩ EventBanner 下部の note (時計アイコン + 事前来場登録 + 説明)
       SP では アイコン左固定・"事前来場登録" を独立行に・本文は自然に流す */
    .event-banner__note-inner {
      align-items: flex-start !important;
      gap: 8px !important;
    }
    .event-banner__note-icon {
      flex-shrink: 0;
      margin-top: 4px;
    }
    .event-banner__note-text {
      display: block;
      font-size: 15px !important;
      line-height: 1.6 !important;
    }
    .event-banner__note-text strong {
      display: block;
      font-size: 17px !important;
      margin-bottom: 2px;
    }

    /* ⑪ Enclosure スペック表 (POWER / LIGHTING / CAMERA / DELIVERY): SPは中央寄せ */
    .enclosure-spec > div {
      text-align: center;
    }

    /* ⑫ Flow ステップカード: SPは数字丸とテキスト部分をどちらも中央寄せ */
    .flow-step__num {
      margin-left: auto !important;
      margin-right: auto !important;
    }
    .flow-step__body {
      text-align: center;
    }
    .flow-step__body .chip {
      /* chip は inline-flex なので親の text-align では効かない → margin auto */
      display: inline-flex;
    }

    /* ⑫.5 HeroC のタイトル・リード文をSPで確実に中央寄せ
       (inline-block の accent span が絡んで左寄せに見える件を打ち消す) */
    .hero-c-title {
      text-align: center !important;
    }
    .hero-c-title .hero-c-accent {
      display: inline !important;   /* inline-block を解除して自然に折り返し */
    }
    .hero-c-title .hero-c-underline {
      display: none;                /* SVG下線は inline化と両立しないので非表示 */
    }
    /* SP用: SVG下線の代わりに CSS text-decoration の波下線を accent部分に */
    .hero-c-title .hero-c-accent {
      text-decoration: underline wavy #FE5E32;
      text-decoration-thickness: 2px;
      text-underline-offset: 6px;
      text-decoration-skip-ink: none;
    }
    /* HeroC のリード文も念のため中央 */
    .mierun .hero-c-title + p {
      text-align: center !important;
    }

    /* ⑭ EventBanner 見出し帯: pill / タイトル / サブ を3行縦積み左寄せ

<script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tweaks_panel.jsx"></script>
<script type="text/babel" src="sections/Common.jsx?v=2"></script>
<script type="text/babel" src="sections/Heroes.jsx"></script>
<script type="text/babel" src="sections/EventBanner.jsx"></script>
<script type="text/babel" src="sections/Problems.jsx"></script>
<script type="text/babel" src="sections/Features.jsx?v=4"></script>
<script type="text/babel" src="sections/Enclosure.jsx"></script>
<script type="text/babel" src="sections/Benefits.jsx"></script>
<script type="text/babel" src="sections/Flow.jsx?v=2"></script>
<script type="text/babel" src="sections/FaqCta.jsx"></script>
<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "buttonSize": "lg",
  "accentColor": "#FE5E32",
  "primaryColor": "#203954",
  "zebra": true,
  "bgBase": "#fcfcfc",
  "bgAlt": "#f0f0f0"
}/*EDITMODE-END*/;

function MierunStitched() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // ボタン & 背景の実反映(動的CSS)
  React.useEffect(() => {
    const sizeMap = {
      sm: { fs: 15, py: 14, px: 28 },
      md: { fs: 16, py: 16, px: 32 },
      lg: { fs: 18, py: 20, px: 36 },
      xl: { fs: 20, py: 22, px: 40 },
    };
    const s = sizeMap[t.buttonSize] || sizeMap.lg;
    let style = document.getElementById('tweak-style');
    if (!style) {
      style = document.createElement('style');
      style.id = 'tweak-style';
      document.head.appendChild(style);
    }
    // ゼブラON時: 奇数番目セクションは bgBase、偶数番目セクションは bgAlt
    // .lp-frame > div:nth-child(N) でセクションの背景を上書き
    const bgAlt = t.zebra ? t.bgAlt : t.bgBase;
    style.textContent = `
      .mierun .btn-primary:not(.site-header__cta), .mierun .btn-dark { font-size: ${s.fs}px !important; padding: ${s.py}px ${s.px}px !important; }
      .mierun .btn-primary { background: ${t.accentColor} !important; box-shadow: 0 4px 0 ${shade(t.accentColor, -30)}, 0 12px 24px -8px ${alpha(t.accentColor, 0.5)} !important; }
      .mierun .btn-ghost { font-size: ${s.fs}px !important; padding: ${s.py-2}px ${s.px}px !important; border-color: ${t.primaryColor} !important; color: ${t.primaryColor} !important; }
      .mierun .btn-dark { background: ${t.primaryColor} !important; box-shadow: 0 4px 0 ${shade(t.primaryColor, -30)}, 0 12px 24px -8px ${alpha(t.primaryColor, 0.45)} !important; }
      .lp-frame { background: ${t.bgBase} !important; }
      .lp-frame > .sec-base > .mierun { background: ${t.bgBase} !important; }
      .lp-frame > .sec-alt > .mierun { background: ${bgAlt} !important; }
    `;
  }, [t.buttonSize, t.accentColor, t.primaryColor, t.bgBase, t.bgAlt, t.zebra]);

  return (
    <>
      <div className="lp-frame">
        <SiteHeader />
        <div className="sec-base" id="top"><HeroC /></div>
        <div id="event"><EventBannerDxpo /></div>
        <div className="sec-alt" id="problems"><ProblemsA /></div>
        <div className="sec-base" id="features"><FeaturesA /></div>
        <div className="sec-alt" id="enclosure"><EnclosureSection /></div>
        <div className="sec-base" id="benefits"><BenefitsA /></div>
        <div className="sec-base" id="flow"><FlowB /></div>
        <div className="sec-base" id="faq"><FaqSection /></div>
        <div className="sec-alt" id="contact"><CtaB /></div>
        <div className="mierun"><SiteFooter /></div>
      </div>
      <TweaksPanel title="Tweaks">
        <TweakSuggestionBar suggestions={[
          "ヒーロー背景にうっすら板金テクスチャを足して",
          "CTAをもっと目立つ蛍光オレンジに",
          "全体をもうちょっとカジュアル寄りに",
        ]} />
        <TweakSection title="ボタン">
          <TweakRadio label="ボタンサイズ" value={t.buttonSize} onChange={v => setTweak('buttonSize', v)} options={[
            { value: 'sm', label: 'S' },
            { value: 'md', label: 'M' },
            { value: 'lg', label: 'L' },
            { value: 'xl', label: 'XL' },
          ]} />
        </TweakSection>
        <TweakSection title="カラー">
          <TweakColor label="アクセント(CTA)" value={t.accentColor} onChange={v => setTweak('accentColor', v)} options={[
            '#FE5E32', '#FF8800', '#E91E63', '#4FA8C2', '#203954',
          ]} />
          <TweakColor label="主役カラー" value={t.primaryColor} onChange={v => setTweak('primaryColor', v)} options={[
            '#203954', '#0E0A2E', '#4FA8C2', '#2A6FDB',
          ]} />
        </TweakSection>
        <TweakSection title="背景">
          <TweakColor label="ベース背景" value={t.bgBase} onChange={v => setTweak('bgBase', v)} options={[
            '#fcfcfc', '#ffffff', '#f5f5f5', '#fcf9f3', '#f7f3eb',
          ]} />
          <TweakColor label="ゼブラ用 副背景" value={t.bgAlt} onChange={v => setTweak('bgAlt', v)} options={[
            '#f0f0f0', '#eeeeee', '#f5f1e8', '#ece7d8', '#e8e4d6',
          ]} />
          <TweakToggle label="ゼブラ(交互背景)" value={t.zebra} onChange={v => setTweak('zebra', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

// color helpers
function shade(hex, percent) {
  const num = parseInt(hex.slice(1), 16);
  let r = (num >> 16) + percent;
  let g = ((num >> 8) & 0x00FF) + percent;
  let b = (num & 0x0000FF) + percent;
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}
function alpha(hex, a) {
  const num = parseInt(hex.slice(1), 16);
  return `rgba(${num >> 16}, ${(num >> 8) & 0xFF}, ${num & 0xFF}, ${a})`;
}

ReactDOM.createRoot(document.getElementById('root')).render(<MierunStitched />);
</script>
